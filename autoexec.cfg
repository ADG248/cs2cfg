sensitivity 3.125
zoom_sensitivity_ratio 1.000000

//Hud
cl_drawhud true
r_fullscreen_gamma 2.200000
cl_color 0
hud_scaling 1.000000
cl_hud_color 2
cl_teamid_overhead_mode 2
cl_hud_telemetry_frametime_show 2
cl_hud_telemetry_frametime_poor 100.000000
cl_hud_telemetry_ping_show 2
cl_hud_telemetry_net_misdelivery_show 1
cl_hud_telemetry_net_misdelivery_poor 5.000000
r_show_build_info true

//View Model
viewmodel_presetpos 1
viewmodel_fov 65.000000
cl_usenewbob false

//Radar
cl_radar_always_centered true
cl_radar_rotate true
cl_hud_radar_scale 1.000000
cl_radar_scale 0.400000
cl_radar_square_with_scoreboard true

//Game
cl_playerspray_auto_apply true
cl_sniper_delay_unscope false
cl_sniper_auto_rezoom true
cl_silencer_mode 0
r_drawtracers_firstperson true
cl_showloadout 1
cl_use_opens_buy_menu true
cl_buywheel_nonumberpurchasing false
cl_buywheel_donate_key 0
cl_quickinventory_lastinv true
mouse_inverty false
option_duck_method true
option_speed_method false
cl_debounce_zoom true
cl_crosshair_friendly_warning 1
cl_show_observer_crosshair 2
cl_observed_bot_crosshair 1

//Other
bind 9 "exec autoexec"
bind = noclip
bind - sv_rethrow_last_grenade
bind 0 sv_cheats 1
bind 8 toggle volume 0 1

//Keybinds
unbind mwheelup
unbind mwheeldown
unbind i
unbind .

bind ` toggleconsole
bind 1 slot1
bind 2 slot2
bind 3 slot3
bind 4 slot4
bind 5 slot5
bind n slot6
bind x slot7
bind 6 slot8
bind j slot9
bind m slot10
bind alt slot11
bind 7 slot12
bind w +forward
bind a +left
bind s +back
bind d +right
bind mouse1 +attack
bind mouse2 +attack2
bind r +reload
bind q lastinv
bind e +use
bind f +lookatweapon
bind space +jump; bind mwheeldown +jump
bind shift +sprint
bind mouse5 +duck
bind mouse4 voice_modenable_toggle
bind g drop
bind b buymenu
bind t messagemode
bind y messagemode2
bind c +voicerecord
bind ctrl player_ping
bind tab +showscores
bind h +spray_menu
bind z radio
bind v +radialradio2
bind escape cancelselect
bind f3 autobuy
bind f4 rebuy
bind f5 jpeg
bind f6 save quick
bind f7 load quick
bind f10 cs_quit_prompt
bind del mute

// slot6 grenade
// slot7 flash
