// slot12 stim

//Sound and Volume
snd_voipvolume 0.750000
snd_headphone_eq 1
snd_spatialize_lerp "0.5"
snd_steamaudio_enable_perspective_correction false
snd_menumusic_volume 0.000000
snd_roundstart_volume 0.000000
snd_roundaction_volume 0.000000
snd_roundend_volume 0.000000
snd_mvp_volume 0.050000
snd_mapobjective_volume 0.000000
snd_tensecondwarning_volume 0.040000
snd_deathcamera_volume 0.040000
snd_mute_mvp_music_live_players false

alias "+rthrow" "+forward; +jump"
alias "+throw" "-attack; -attack2"
alias "-rthrow" "-jump; -forward"
bind , "+rthrow; +throw"



